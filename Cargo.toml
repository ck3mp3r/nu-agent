[package]
name = "nu_plugin_agent"
version = "0.1.0"
edition = "2024"

[dependencies]
nu-plugin = "0.112.2"
nu-protocol = "0.112.2"
rig = { package = "rig-core", version = "0.35.0" }
tokio = { version = "1.52.1", features = ["full"] }
chrono = "0.4"
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
serial_test = "3.4.0"
